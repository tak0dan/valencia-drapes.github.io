<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resenas y Google Maps | Cortinas Valencia</title>
  <link rel="stylesheet" href="../../linked-css/styles.css" />
</head>
<body class="reviews-page" data-themes-base="../../themes">
  <header class="header">
    <div class="container topbar">
      <a class="logo-link" href="../../Index.html">
        <img class="logo-image" src="../../assets/logo.jpeg" alt="Logo Cortinas Valencia" />
        <span>Cortinas Valencia</span>
      </a>
      <div class="theme-tools">
        <label for="theme-selector">Tema:</label>
        <select id="theme-selector" data-theme-selector></select>
      </div>
    </div>
  </header>

  <main class="service-shell">
    <section class="service-hero">
      <div class="container service-hero-content">
        <p class="breadcrumb"><a href="../../Index.html">Inicio</a> / Resenas y Google Maps</p>
        <div class="hero-panel">
          <h1>Resenas y Google Maps</h1>
          <p class="lead">Opiniones reales y ubicacion para visitarnos facilmente.</p>
        </div>
      </div>
    </section>

    <section class="service-article">
      <div class="container article-inner">
        <section
          class="detail-card reviews-marquee"
          aria-label="Resenas de Google"
          data-google-reviews
          data-reviews-source="prefetched"
          data-google-place-query="INGAMA TEXTIL / CORTINAS Y DECORACION DEL HOGAR, Valencia"
          data-min-rating="3.5"
          data-google-api-key=""
          data-reviews-endpoint="../../assets/google-reviews.prefetch.json"
          data-prefetched-reviews="../../assets/google-reviews.prefetch.json"
        >
          <div class="reviews-marquee-head">
            <h2>Resenas y Google Maps</h2>
          </div>

          <div class="reviews-marquee-grid">
            <div class="reviews-lanes" aria-live="polite">
              <div class="reviews-lane" data-direction="right">
                <div class="reviews-track" data-reviews-track="0"></div>
              </div>
              <div class="reviews-lane" data-direction="left">
                <div class="reviews-track" data-reviews-track="1"></div>
              </div>
              <div class="reviews-lane" data-direction="right">
                <div class="reviews-track" data-reviews-track="2"></div>
              </div>
            </div>

            <aside class="reviews-map-card" aria-label="Mapa de tienda en Google Maps">
              <iframe
                class="reviews-map-frame"
                title="Mapa INGAMA TEXTIL"
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
                src="https://www.google.com/maps?q=INGAMA%20TEXTIL%20VALENCIA&output=embed"
              ></iframe>
              <a class="map-link-btn" href="https://maps.app.goo.gl/vK4tr5SUv1c3KCzt8" target="_blank" rel="noopener noreferrer">Abrir en Google Maps</a>
            </aside>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script src="../../assets/theme-loader.js"></script>
  <script src="../../assets/reviews-marquee.js"></script>
</body>
</html>
